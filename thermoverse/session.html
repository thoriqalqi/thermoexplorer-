<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk Sesi — ThermoExplore</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#ff6b6b;--orange:#0c3753;--gold:#ffdf7a;--bg:#f5f8fa;--card:#ffffff;--border:rgba(12,55,83,.12);--text:#0c3753;--muted:#526f82}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.18;animation:drift 12s ease-in-out infinite alternate}
    .o1{width:500px;height:500px;background:#0c3753;top:-120px;left:-100px}
    .o2{width:400px;height:400px;background:#ffdf7a;bottom:-80px;right:-80px;animation-delay:-5s}
    .o3{width:250px;height:250px;background:#165682;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s}
    @keyframes drift{to{transform:translate(30px,20px) scale(1.08)}}
    .card{position:relative;z-index:10;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(12,55,83,.1);animation:up .6s ease both}
    @keyframes up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:36px}
    .logo-icon{font-size:3rem;display:block;filter:drop-shadow(0 0 18px rgba(12,55,83,.2));animation:glow 2.5s ease-in-out infinite}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 18px rgba(12,55,83,.2))}50%{filter:drop-shadow(0 0 34px rgba(255,223,122,.6))}}
    .logo h1{font-size:1.8rem;font-weight:800;color:var(--orange)}
    .logo p{color:var(--muted);font-size:.9rem;margin-top:4px}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:.82rem;font-weight:600;color:var(--orange);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:1rem;padding:14px 16px;outline:none;transition:border-color .25s,box-shadow .25s}
    input::placeholder{color:var(--muted)}
    input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(12,55,83,.15);background:#fff}
    #session-code{font-size:1.3rem;font-weight:700;letter-spacing:4px;text-align:center;text-transform:uppercase}
    .btn{width:100%;padding:16px;background:var(--orange);border:none;border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s,opacity .2s;box-shadow:0 6px 24px rgba(12,55,83,.2);margin-top:8px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(12,55,83,.3);background:#165682}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .msg{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:.9rem;display:none;text-align:center}
    .msg.error{background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.4);color:#ff8080;display:block}
    .msg.success{background:rgba(50,200,100,.15);border:1px solid rgba(50,200,100,.4);color:#80ffaa;display:block}
    .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;margin-top:24px;color:var(--muted);font-size:.82rem}
    .footer a{color:var(--orange);text-decoration:none}
    .offline-badge{background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.3);color:#ffd666;font-size:.78rem;border-radius:8px;padding:6px 12px;text-align:center;margin-bottom:20px;display:none}
  </style>
</head>
<body>
  <div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🌡️</span>
      <h1>ThermoExplore</h1>
      <p>Masukkan kode sesi dari guru kamu</p>
    </div>
    <div id="offline-badge" class="offline-badge">⚠️ Mode offline — data tidak tersinkron antar device</div>
    <form id="join-form" autocomplete="off">
      <div class="form-group">
        <label for="session-code">🔑 Kode Sesi</label>
        <input type="text" id="session-code" placeholder="THERM-XXXX" maxlength="10" required/>
      </div>
      <div class="form-group">
        <label for="group-name">👥 Nama Kelompok</label>
        <input type="text" id="group-name" placeholder="cth: Kelompok Helium" maxlength="40" required/>
      </div>
      <button type="submit" class="btn" id="join-btn">🚀 Bergabung ke Sesi</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="footer">Guru? <a href="admin.html">Buat &amp; kelola sesi →</a></div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/session.js"></script>
  <script>
    const codeInput = document.getElementById('session-code');
    const nameInput = document.getElementById('group-name');
    const btn       = document.getElementById('join-btn');
    const msgEl     = document.getElementById('msg');

    window.addEventListener('load', () => {
      if (!window.FIREBASE_READY) document.getElementById('offline-badge').style.display = 'block';
    });

    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9-]/g,'');
    });

    function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'msg ' + type; }

    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code  = codeInput.value.trim().toUpperCase();
      const gName = nameInput.value.trim();
      if (!code || !gName) { showMsg('Isi semua field ya!', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Menghubungkan...';
      msgEl.className = 'msg';

      const res = await SessionManager.joinSession(code, gName);
      if (res.success) {
        showMsg('✅ Berhasil! Memuat game...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      } else {
        showMsg('❌ ' + (res.error || 'Gagal bergabung'), 'error');
        btn.disabled = false;
        btn.innerHTML = '🚀 Bergabung ke Sesi';
      }
    });
  </script>
</body>
</html>
